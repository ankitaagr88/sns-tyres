<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- SNS Tyres favicon: a tyre in the brand colours — charcoal rubber,
       coral hub, gold centre. -->
  <circle cx="50" cy="50" r="48" fill="#262B36"/>
  <!-- tread notches -->
  <g stroke="#3D4453" stroke-width="7" stroke-linecap="round">
    <line x1="50" y1="4"  x2="50" y2="16"/>
    <line x1="50" y1="84" x2="50" y2="96"/>
    <line x1="4"  y1="50" x2="16" y2="50"/>
    <line x1="84" y1="50" x2="96" y2="50"/>
    <line x1="17.5" y1="17.5" x2="26" y2="26"/>
    <line x1="74" y1="74" x2="82.5" y2="82.5"/>
    <line x1="82.5" y1="17.5" x2="74" y2="26"/>
    <line x1="26" y1="74" x2="17.5" y2="82.5"/>
  </g>
  <circle cx="50" cy="50" r="26" fill="#E0495F"/>
  <circle cx="50" cy="50" r="11" fill="#F0B93E"/>
</svg>
